name: Bug report
description: Report a bug in Jigo AI Workspace
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Node version, browser"
  - type: checkboxes
    id: config
    attributes:
      label: Configuration
      options:
        - label: OpenRouter configured
        - label: Supabase configured
        - label: Integrations configured
